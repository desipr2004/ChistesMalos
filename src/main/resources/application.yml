spring:
  application:
    name: ChistesMalos

  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:chistes_malos_db}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none

    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null


  jwt:
   secret: MiClaveUltraSecretaJWT2026SpringBootProyecto123456
   expiration: 86400000
   refresh-expiration: 604800000